front:
  text: 新鐫金剛般若波羅蜜音釋直解序夫金剛經者乃詮人妙心也心也者炳煥靈明光吞宇宙冲虗妙粹照歷塵沙竪窮三際虗空未可並其悠橫遍十方天地豈能同其大亘今古無舊無新處聖凡不增不減是諸佛之樂土乃衆生之本源也非善現孰得究明此宗微阿難誰能編集是教經分三十二分分分義契菩提字布五千餘言言言談歸般若三乘四果之階梯悉依此心而證立九有四生之異類皆由斯理以分流唯此經者其文至略其義甚深讀者雖多悟之亦少既悟後則頭非鏡裏若醒來則珠在衣中如窮子見父嚴飾珍寶現成倘婆女見兒狂亂憂心頓歇欲渡者此即洪舟求安者此真華屋矣愚熟讀之方究義也搜挹諸典直解是經去繁就簡便誦者之易知引淺至深與學人之可入自知僭竊之罪莫逃實為受持之者詮爾刻金剛般若波羅蜜經序蓋最上一乘之法者乃佛為一大事因緣而說也為時之龜鑑作物之權衡既澄濁水當以菩提妙珠欲斷妄塵須是金剛寶劒世界有三千大千之異地舉一念而全收衆生有九種十類之殊途向一真而悉度斯經至簡其理至玄今之誦者但祈福德不究福德之性也新釋此書名為直解豫將覽矣便覺惺之始信下和之不石也水未入海難成鹹味人未究理何契心源噫旨玄道妙豈淺識者能信哉上智知之如良馬見鞭涅槃門近下士聞矣似癡猴捉月生死路長大哉師兄荷天者聞斯經典捐資刊行施與有志者觀矣倘能一言而悟何甘纍劫之迷不受福德奚沉有海知法無我即契無生尋流可得泉源會經方明宗旨今杲既而注矣豫衍亦為序之
