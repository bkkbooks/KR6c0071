body:
  text: 武夷十六洞天城高僧圓杲解註僧圓衍校正雲慶庵僧圓祿僧圓貴繡梓金剛經啟請若有人讀誦此經者須當一心離諸雜想究竟經義先念淨身口真言後請八金剛四菩薩名號隨所在處常得擁護矣淨身真言修多唎修多唎修摩唎娑𭌯訶淨口業真言修利修利摩訶修利修修利薩婆訶安土地真言南無三滿多沒䭾南唵度嚕度嚕地尾娑婆訶普供養真言唵誐誐曩三婆𭌯韈日囉斛八金剛奉請青除災金剛奉請辟毒金剛奉請黃隨求金剛奉請白淨水金剛奉請赤聲金剛奉請定持災金剛奉請紫賢金剛奉請大神金剛四菩薩奉請金剛眷菩薩奉請金剛索菩薩奉請金剛愛菩薩奉請金剛語菩薩註曰此八金剛四菩薩者廼前迦葉佛時有一旃陀羅此云屠宰至寺前拾得一紙千佛名經持歸供養感妻有姙生一肉毬破視有八男子及長心行正直力勇過人能伏諸邪惡妻後又產一毬破視亦有四女及長顏貌端嚴慈善勝眾持齋奉佛化兄出家兄妹一十二人同皈迦葉佛修行護教男證金剛女證菩薩常護是經故安經前若人誦此經者殷勤啟請則此金剛菩薩隨處擁護矣發願文稽首三界尊皈命十方佛我今發弘願持此金剛經上報四重恩下濟三塗苦若有見聞者悉發菩提心盡此一報身同生安樂國云何梵云何得長壽金剛不壞身復以何因緣得大堅固力云何於此經究竟到彼岸願佛開微密廣為眾生說此經乃梁昭明太子分為三十二分開經偈無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義金剛般若波羅蜜經金者喻心之真體也人之心體如百鍊之真金金經百鍊而金體不消成眾噐而金色不變人之心體亦然雜諸緣而心神不昧溷眾類而心體常靈故心同虗空永固金隨今古常精故心以金喻之剛者喻心之真智也人之心智如剛利鋒刀刀斷萬物而刀體常剛經千磨而刀鋒愈利心智亦然智鑑諸塵而智眼常明了諸法而智心永寂故智有裁決之能如刀有斷截之義是智以剛刀喻也般若者梵語此云智慧智慧者心之真慧也慧光如鏡諸形臨鏡而妍自現鏡鑑諸形而纖洪莫隱心慧亦然至隱能燭至微能知無塵不顯無物不彰慧有先見之明鏡有洞明之體故慧以鏡喻之波羅蜜者梵語此云到彼岸也岸者土也分於彼此故有此岸彼岸此岸者心之妄也遇緣即動見境即生凡遇境緣生諸妄法諸有業緣輪轉此岸也此只眾生業識感報之土也眾生業盡此岸即消矣彼岸者心之果也靈虗獨露寂淨湛然塵不能染法不能緣果人之土也心常圓明湛寂此即彼岸矣經者心之路也若人依此金剛般若而行則直到無為之岸也以此觀之則金剛般若波羅蜜經者即是人之自己一個真心也迷之則生死始悟之則輪迴息今修行人知此自心智此自性知真無妄以智慧燈照破塵緣了此妄法立萬行而不著於心遇諸緣而心常湛寂如此修行疾登彼岸矣偈云金剛般若義含多有筏方能可渡河心鏡未明休懈怠更須經上切磋磨姚秦三藏法師鳩摩羅什奉詔譯姚秦東晉偽王也姓姚名興為秦國王也三藏者經律論也鳩摩羅什此云童壽謂童年而有宿耆材德故秦王詔譯此經譯者翻梵語為此語矣法會因由分第一如是我聞如是者真不違俗名如俗順於真曰是故稱如是也如是之法我從佛聞我者阿難自稱也佛說此經我親得聞矣此經說我者謂空相無我之真我聞者謂緣空無聞之真聞也昔弟子常問於佛云他時編集經教當如何起首佛言從如是我聞起也一時佛在舍衛國祗樹給孤獨園一時者是佛說經之時也佛者覺也心體離念覺了真妄覺體週法界中盡虗空際最清淨者迷此眾生悟此即佛也舍衛國者乃波斯匿王所居之國也祗樹者祗陀太子所施之樹故稱祗樹也給孤獨園者舍衛國中有一長者名須達多先事外道亦好施貧濟諸孤獨故國人稱名為給孤獨長者聞佛說法心生渴仰布金買祗陀太子之園建立精舍請佛居此說法祗陀施樹給孤獨園故稱祗樹給孤獨園也孤獨者幼而無父曰孤老而無子曰獨矣與大比音必丘眾千二百五十人俱比丘含三義一乞士二破惡三怖魔也大比丘者道德之稱也千二百五十人俱者佛初度陳如等五人次度三迦葉兄弟兼徒弟眾一千次度舍利弗目揵連各兼徒眾一百次度耶舍長者等五十人經中舉其大數故減五人此眾並事外道後轉受佛教也爾時世尊食時著衣持鉢入舍衛大城乞食爾時者彼遇食之時也世尊者世世常仰三界獨尊故稱世尊也食時者人之所食之時則佛著三衣持寶鉢入城乞食教化眾生去此憍慢入城者精舍城外從外而入故曰入城於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷音呼座而坐次第者不擇貧富次第乞矣至本處者至祗園精舍之處收衣鉢者收起三衣袈裟與鉢盂後洗足整座而坐也善現起請分第二時長老須菩提在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊須菩提佛之弟子行證無諍故稱善現了法虗妄理悟真空亦曰空生亦名解空尊者心得菩提正道稱理得名故名須菩提也請佛開示菩提妙心故偏袒右肩膝跪合掌敬白佛言此為教至敬而已希有世尊者言佛福慧雙足嘆言三界之內少有我佛之慈愍也如來善護念諸菩薩善付囑諸菩薩如來者佛號也本覺名如始覺名來本始不二故稱如來矣菩薩者修行人通稱之也菩薩梵語菩提薩埵今略其文而言菩薩此云覺有情也覺性中若有情妄即名眾生覺無情妄即名為佛故有情即是眾生也惟有如來慈悲愍念眾生善能守護有大智慧一乘心法囑付諸菩薩世尊善男子善女人發阿耨音奴入聲多羅三藐音渺三菩提心云何應住云何降伏其心阿耨多羅三藐三菩提者梵語也此云無上甚深正等正覺此即人之圓覺妙心也若人發此正覺之心當依何住何能降此塵妄之心矣佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善哉善哉者嘆美之辭也言須菩提善能問此菩提妙心也諦者審也善男子善女人發阿耨音奴入聲多羅三藐音渺三菩提心應如是住如是降伏其心唯然世尊願樂音要欲聞應者當也如是者當理即如無非即是此言欲發菩提妙淨真心當向菩提心中而住如此方能降伏塵妄之心唯者諾也然者是也須菩提聞佛說此真能降妄默契無疑唯此應之速也稱尊領教願樂欲聞樂者愛也大乘正宗分第三佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切眾生之類摩訶者梵語此云是大也摩訶薩者即大菩薩也一切眾生一切者總標也眾者不一之稱生者生滅之義也若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃而滅度之眾生雖多不出九種十二類涅槃體上本無眾生按楞嚴經中廼覺明為咎應根塵識業性發生見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業六種亂想隨業感生種種眾生各有八萬四千充塞其類也若卵生者卵惟想生合氣成卵識想飛沉故有魚鳥之類也若胎生者胎因情有合精成胎慾想竪橫故感人畜之類也若濕生者濕以合感合愛為濕和煖發生所趣無定翻覆亂想故感蠢蝡之類也若化生者化以離應意欲飛騰趣新亂想無而忽有故有轉蛻飛行之類也若有色者但事日月星辰堅執留礙其心亂想結成精耀休咎精明其類充塞若無色者厭有著空滅身歸無惑業昏重識附陰隱體合空昧空散銷沉其類充塞若有想者虗妄失真邪著影像無有實色託識罔象潛結貌狀神鬼精靈其類充滿若無想者不了諦理固守愚痴習定灰疑思專枯槁精神化為土木金石其類充塞若非有想者誣罔取他納為己有忘本蒸甞認彼宗嗣異質相成其類充塞若非無想者怨害相酧傷殺相反生理恠誕棄絕倫義如土梟附塊為兒子成父母皆遭其食其類充塞此說九種十二類眾生皆未悟明涅槃妙心迷陷情欲積妄發生妄隨輪轉誰不知此眾生心體本即涅槃若一念回光悟明無生之理斷除情妄即證入無餘涅槃而自滅度之矣涅槃者乃無生滅之心是也眾生分上無欠無餘矣有餘者習氣未盡無餘者能所俱消也如是滅度無量無數無邊眾生實無眾生得滅度者何以故須菩提若菩薩有我相人相眾生相壽者相即非菩薩四相者識心未了即有我相迷己認他即有人相情妄未除即眾生相作後有念即壽者相菩薩心淨諸法不生實非有相若四相去除即非真菩薩矣妙行無住分第四復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相復次者重舉也心有住著即名慳貪心無住著即名布施法乃塵妄之名布施解脫之義法本無住所生滅隨緣言菩薩勿著於心當行布施也六塵者在眼曰色在耳曰聲在鼻曰香在舌曰味在身曰觸在意曰法今此六塵之相若生染著即為慳貪若無住著即名布施矣何以故若菩薩不住相布施其福德不可思量不住相布施者菩薩覺心清淨知法本空雖有萬行利益眾生無有一毫著福之念淨心無染其福莫量也須菩提於意云何東方虗空可思量不音否不音弗也世尊須菩提南西北方四維上下虗空可思量不音否不音弗也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住東南西北為四方四維即四隅也以四方四維上下總謂十方矣虗空本無方所何有十方佛言十方者顯此虗空大之無極矣今謂菩薩無住相布施言福德亦如此之大者而心包太虗則福性亦同太虗之大也是故佛告菩薩不當住法住相但當心無所住處而住若心無所住是名真住矣如理實見分第五須菩提於意云何可以身相見如來不音否不音弗也世尊不可以身相得見如來何以故如來所說身相即非身相如來者即真如性也是諸佛法身乃眾生本體也身相者是色身幻相也言不可以執幻相得見真如妙心也相本漚幻故佛言身相即非身相也佛告須菩提凡所有相皆是虛妄若見諸相非相即見如來若見諸相非相者心不起分別見相之念也若見相著相即背真理見相非相即見如來矣正信希有分第六須菩提白佛言世尊頗有眾生得聞如是言說章句生實信不佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根實信者實諦之階梯也信則所言之理順順則師資之道成蓋須菩提疑此如來言說般若無相章句眾生難信故作是問而佛恐阻眾生實信之心且告之莫作是說矣持戒者諸惡莫作修福者眾善奉行倘佛滅度之後若人聞此般若章句信為實有者則知此人不但於三五佛前種諸善根特於無量劫中承事諸佛種善根矣聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸眾生得如是無量福德何以故是諸眾生無復我相人相眾生相壽者相無法相亦無非法相淨信者淨者淨而無染信者信而無疑若人聞是章句生一念淨信者悉知此人心空四相諸法自淨矣無法相者為無見所執也亦無非法相者為有見所執也是以法相本無因執故有若能信心清淨則眾生垢淨如此即得福無量矣何以故是諸眾生若心取相即為著我人眾生壽者若取法相即著我人眾生壽者何以故若取非法相即著我人眾生壽者是故不應取法不應取非法以是義故心本無相若覔心取相者即著四相若法與非法悉屬妄緣俱無實相若取而求之亦染四相是故諸法體空不當取著故如來說不取相者以是義故如來常說汝等比音必丘知我說法如筏音伐喻者法尚應捨何況非法佛說一切法度我一切心我無一切心何用一切法是以如來說法如舡筏者能度此岸人於彼岸矣蓋人四相空塵心淨正法當捨何況非法正謂渡河當用筏到岸不須舟矣無得無說分第七須菩提於意云何如來得阿耨音奴入聲多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨音奴入聲多羅三藐音渺三菩提亦無有定法如來可說如來妙心無有決定之法即名菩提亦無有定法可說也如鏡本無定像隨形自現法本無定體隨緣自生道經云空即是空空無定空色即是色色無定色是也何以故如來所說法皆不可取不可說非法非非法所以者何一切賢聖皆以無為法而有差別無為體上實無法可得可說矣今經言非法非非法者此法說有亦非有說無亦非無非法者心本是無非非法者應緣而有理惟一心事收萬法矣所以者何言理無濶峽見有淺深此無為體上或有得皮得骨得髓者聖賢之位隨德稱尊見深行廣位重名高三乘賢聖於此無為體上證悟各有淺深之殊依法出生分第八須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不音否三千世界者日月運行一須彌山照四部洲中為一小世界以一千小世界為一小千世界以一千小千世界為一中千世界以一千中千世界為一大千世界以一千大千一千中千一千大千總為三千大千世界也七寶者所謂金銀瑠璃珊瑚瑪瑙瑱珠玻瓈是也佛言盡三千世界七寶布施言得福雖多不如般若功德之大也須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多須菩提證無諍三昧悟體性空答福德甚多者心順無諍言非福德者性悟真空也福德性者乃般若之慧也性非福德故如來說福德多矣若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨音奴入聲多羅三藐音渺三菩提法皆從此經出此經中乃至四句偈者休言獨稱四句偈上有乃至二字下有等字也或有一句二句乃至百千萬句只此統說何以獨稱四句偈耶看經者可宜詳觀也此言統說金剛般若經中之大義也般若無相偈說無為謂人心體本自無為當依般若能證無為之果矣若人於此經中能悟明真理操心向道更復為人解說此經之義則是人其福勝前三千七寶布施福德也唐玄宗云三千七寶雖多用盡還歸生滅四句經文雖少悟之直至菩提所言諸佛及諸佛法皆由此金剛般若而出者惟此經之至要也須菩提所謂佛法者即非佛法佛法在心而不在教故云所謂佛法者即非真佛法也一相無相分第九須菩提於意云何須陀洹音桓能作是念我得須陀洹果不音否須菩提言不音弗也世尊何以故須陀洹音桓名為入流而為所入不入色聲香味觸法是名須陀洹須陀洹斯陀含阿那含阿羅漢此四果者乃凡夫流入聖位之階級也若人心當以無念為宗無著為用佛恐人心存四果之念萌於其間以障其道故設此四果而問須菩提皆以不也答之復為辨論若以事言之則有果有相若以理言之則非果非相斷三結得須陀洹果不墮三惡人天七返永斷諸苦入於涅槃名為入流者心不入六塵之境初流入聖地是名須陀洹也須菩提於意云何斯陀含能作是念我得斯陀含果不音否須菩提言不音弗也世尊何以故斯陀含名一往來而實無往來是名斯陀含斷三結薄貪嗔痴得斯陀含果永斷諸苦樂證無為名一往來者一反生天上一反生人間便得涅槃雖名往來而實無往來是名斯陀含也須菩提於意云何阿那含能作是念我得阿那含果不音否須菩提言不音弗也世尊何以故阿那含名為不來而實無不來是名阿那含斷下五結得阿那含果見思惑斷永脫苦輪入於涅槃名為不來者不來欲界受生也而實無不來者心無所得而不著不來之相也須菩提於意云何阿羅漢能作是念我得阿羅漢道不音否須菩提言不音弗也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人眾生壽者阿羅漢果者永斷貪欲瞋恚愚痴無餘煩惱生滅以盡淨行以立於法無染不來三界受生矣阿羅漢者悟諸法空若作得道之念有所得心未除即著四相矣世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊即不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行無諍者隨順無違也三昧梵語此云正受心不受一法是也阿蘭那者梵語此云即無諍也須菩提離三界欲證四果法得無諍三昧體悟真空乃人中最為第一者雖然證此四果位而心不作是念若心作此證果之念則與道相違佛即不說須菩提是行無諍之行也實無所行者悟心無得雖云無諍之行亦是虗名耳莊嚴淨土分第十佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得如來者佛自稱也然燈佛者即是釋迦牟尼佛之師也法由心悟豈從外得以心印心是名為得也須菩提於意云何菩薩莊嚴佛土音度不音否不音弗也世尊何以故莊嚴佛土音度者即非莊嚴是名莊嚴菩薩莊嚴者菩薩六度萬行以為莊嚴佛土者心土也真如妙心廼諸佛之淨土是眾生之覺源也但了法空淨即真莊嚴維摩經云隨其心淨則佛土淨蓋此心淨便是莊嚴也若著相施為即非莊嚴名莊嚴矣是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心佛土既以心淨為莊嚴則菩薩當生無染淨心不當生六塵妄想之心矣而者下接上之辭也應無所住而生其心者若心無染而清淨真心自生也譬如天平盤中無物其針自正矣須菩提譬如有人身如須彌山王於意云何是身為大不音否須菩提言甚大世尊何以故佛說非身是名大身王者眾所尊也須彌山者上至忉利天下極崑崙際乃娑婆世界之主山也大之莫及矣佛引此譬喻尚有人身如須彌山之大可為大否須菩提遵順無違答言甚大須彌雖大不滿虗空法身之大含納大虗故楞嚴云虗空生汝心內由如片雲點太清裏況世界生於虗空之內須彌亦住世界之中豈得為大也故法身無相誠為大也須彌有相不足為大矣是故佛說非身是名大身也無為福勝分第十一須菩提如恒河中所有沙數如是沙等恒河於意云何是諸恒河沙寧為多不音否須菩提言甚多世尊但諸恒河尚多無數何況其沙恒河者舍衛國城外有河名恒河也佛常指河中沙為喻言恒河中有此無量數之沙亦有無量數之恒河勝過此沙之多是諸恒河中之沙此言多之甚矣須菩提我今實言告汝若有善男子善女人以七寶滿爾所恒河沙數三千大千世界以用布施得福多不音否須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德恒沙七寶布施福報無過人天若人於此經中究明至理必證菩提之果矣尊重正教分第十二復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟隨說者隨處與人說經之所也塔者貯佛舍利之塔廟者立佛聖相之廟也故有人天修羅而此供養今當知此說經之處一切人道天道修羅道皆以香華幡蓋以為供養勝若佛之塔廟者何也為一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出也是故人天如此恭敬矣何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子若人明此般若妙義即知心能作佛如此受持則是成就第一希有之法也一切諸佛皆依般若而證故云此經在處即為有佛也是人若能恭敬此經即為尊重弟子也如法受持分第十三爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持金剛是喻般若是法般若波羅蜜是梵語此云智慧到彼岸也出前經題註訖耳以是名字者此經乃般若之名非真般若之體故說名字也汝當奉持者當依義奉行持教流通也所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜但有言說皆無實義般若無相故佛說即非般若是名般若也須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說如來說法為利生故真如體淨實無法可說也須菩提於意云何三千大千世界所有微塵是為多不音否須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界三千世界不外乎心一切微塵悉依於地故世界者隨眾生心業所感而有眾生心淨則世界淨眾生心垢則世界垢悟法無體即非微塵悟相虗妄則非世界佛心空寂觀此微塵不實世界非堅故說非有塵世是名塵世也須菩提於意云何可以三十二相見如來不音否不音弗也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相三十二相者如來以三十二妙行感此報身妙相淨如琉璃內外明徹雖則報身殊妙亦是幻妄終歸壞滅故說非相是名為相也須菩提若善男子善女人以恒河沙等身命布施七寶布施是利物濟貧身命布施乃了心立行無非福報也若復有人於此經中乃至四句偈等為他人說其福甚多佛言小則微塵大則世界福報則妙身立行則布施如此塵世身行四事盡屬虗幻無有實體若人能持此一經為人解說則得福多矣離相寂滅分第十四爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經須菩提聞佛說塵世身行盡屬虗幻深悟明此金剛般若之義傷感悲泣白言世尊我昔得緣空慧眼如何契此經義之遲也世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德實相者真實無妄之相也若人聞此經義信心清淨則實相自生誠為第一希有之功德也世尊是實相者即是非相是故如來說名實相實相無相托名為相故說非相也世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有眾生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無眾生相無壽者相所以者何我相即是非相人相眾生相壽者相即是非相何以故離一切諸相即名諸佛須菩提言聞經受持不離者心空即受持不難來世眾生能空四相持此經者即為第一希有有四相即忘殀之體般若無相離相體淨故名離相即殀破相盡是名諸佛佛告須菩提如是如是若復有人能聞是經不驚不怖不畏當知是人甚為希有如是如是者佛許言之理當理當也若人聞此般若無相妙法則無驚疑怖畏者此人亦為希有也何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜第一波羅蜜者非說布施波羅蜜為第一也直說金剛般若波羅蜜矣此般若能攝三乘四果六度萬行凡諸善法皆依般若之功也非般若則不能立此行非般若則不能證是果矣是心經云菩提薩埵依般若波羅蜜而得究竟涅槃三世諸佛依般若波羅蜜得證菩提正果故此般若是無上呪是無等等呪如此佛稱般若為第一之波羅蜜也即非第一波羅蜜若屬言說亦是名字中波羅蜜也須菩提忍辱波羅蜜如來說非忍辱波羅蜜是名忍辱波羅蜜忍辱能降嗔怒嗔怒能渾般若古云一念嗔心起八萬障門開若嗔怒既是不降則般若真性不現故佛設忍辱之權方淨般若之體故稱忍辱波羅蜜也則忍辱亦無實體其嗔既泯其忍自消故謂非忍辱也何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無眾生相無壽者相何以故我於往昔節節支解時若有我相人相眾生相壽者相應生嗔恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無眾生相無壽者相歌者好聲色利者貪財利六祖云此王好色貪利是無道之君也人以一生為一世佛在歌利王五百世前因中修五百世忍辱波羅蜜矣故四相不生其心不忍而自忍也是故須菩提菩薩應離一切相發阿耨音奴入聲多羅三藐音渺三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住佛言欲發無上覺心者不當著諸幻相勿著六塵妄心當生無住真心若心有法住者即非真住故肇師五論云聖人之心住無所住是故佛說菩薩心不應住色布施須菩提菩薩為利益一切眾生故應如是布施住色布施者言著相布施也菩薩布施為利生也故華嚴經云不為自身求快樂但為救護諸眾生是也如來說一切諸相即是非相又說一切眾生即非眾生諸相是妄塵眾生是妄識俱無實體故佛說諸相非相眾生非生也須菩提如來是真語者實語者如語者不誑語者不異語者真語不偽實語不虗如語理當不誑語無妄不異語始終為一故聖人之語義語也非比眾生欺誑之語也須菩提如來所得法此法無實無虗得法者悟明心法也此法無實無虗者言實而無相可覩言虗而應用無窮此即空不空如來藏也須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色妄法能翳真心若菩薩住法布施欲見如來法體如人處於暗室欲覩諸相實不可得若心不住法而布施者空體昭然如人有目一契心原如空有日見種種色瞭然在目矣須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德當來世者將來之世也此金剛般若經者佛之智慧若人能持讀誦解其實義者則知斯人入佛知見得佛知見即為如來如此成就無量功德也持經功德分第十五須菩提若有善男子善女人初日分以恒河沙等身布施中日分復以恒河沙等身布施後日分亦以恒河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說初日分者蚤也中日分者午也後日分者晚也恒沙等身布施者言了却相續塵沙妄念也一日三時立此萬行雖加三省之勤經塵劫之修若未能悟徹般若大義其福縱廣證道亦難也若人聞此經義信而不逆其福勝彼何況書持演讀流通今古者哉須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說要言者簡要之言也謂此經乃最上一乘之法若人能契此經之義直證無上正覺之道故言此功德不可思議稱量也乘者乘物之器也大乘者菩薩乘也菩薩利生願重如大車在途大船在海凡遇有情無不載度矣最上乘者佛乘也言不可及也三界萬類但為有緣悉載度之佛恐人機小心生取著聞此般若無相之經即生疑惑故與上乘者說也若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨音奴入聲多羅三藐音渺三菩提荷擔者荷負如來正覺之法也此金剛經者乃佛之命脉若人能持讀解義廣為人說即為荷負如來正法言福之多矣何以故須菩提若樂小法者著我見人見眾生見壽者見即於此經不能聽受讀誦為人解說小法者小乘之法也小乘之人著相求道聞此般若非相即生疑惑不能受持流通也故仲尼云中人以下不可以語上也須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍遶以諸華香而散其處在在處處者言有經在之處也此說與十二會同能淨業障分第十六復次須菩提若有善男子善女人受持讀誦此經若為人輕賤是人先去聲世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨音奴入聲多羅三藐音渺三菩提惡道者即三惡道也乃地獄餓鬼畜生是也若人前生造此惡罪當受此惡報為持此經以重報輕免墮惡道若能更悟明此義當體全空即惡果頓消淨業立成也正謂千年暗室一燈破萬劫𠍴尤半句消矣須菩提我念過去無量阿僧祗劫於燃燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及阿僧祗那由他梵語二者皆是數此云即是無量數也供佛是布施承事是立行也佛言我在燃灯佛無量劫前供養承事無量諸佛功德與持經之人功德千萬億分莫及其一須菩提若有善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信末世者末法之世也此經中功德佛不一一具說者道大難信恐人生疑起謗經之罪故不盡說也須菩提當知是經義不可思議果報亦不可思議言此般若妙義菩提道果其中功德皆不可思議也究竟無我分第十七爾時須菩提白佛言世尊若善男子善女人發阿耨音奴入聲多羅三藐音渺三菩提心云何應住云何降伏其心佛告須菩提若善男子善女人發阿耨音奴入聲多羅三藐音渺三菩提心者當生如是心我應滅度一切眾生滅度一切眾生已而無有一眾生實滅度者如是心者即此無分別心是也須菩提問發菩提心者與前二會同意佛告滅度眾生者與三會同意不必重註也何以故若菩薩有我相人相眾生相壽者相即非菩薩所以者何須菩提實無有法發阿耨音奴入聲多羅三藐音渺三菩提者若心萌四相即非菩薩心無一法即契菩提須菩提於意云何如來於然燈佛所有法得阿耨音奴入聲多羅三藐音渺三菩提不音否不音弗也世尊如我解佛所說義佛於燃燈佛所無有法得阿耨多羅三藐三菩提無法可得言心中實無所得也故云心無一法即如來是則名如觀自在也佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨音奴入聲多羅三藐音渺三菩提者燃燈佛即不與我授記汝於來世當得作佛號釋迦牟尼如是如是者佛許言之理當佛者覺也然燈者名也覺心無染名之為佛若心有法則背覺合塵違佛真體即不授記耳梵語釋迦此云能仁梵語牟尼此云寂默能仁者於情不染寂默者於法不生以實無有法得阿耨音奴入聲多羅三藐音渺三菩提是故燃燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義實無有法二佛體同如鏡照鏡似空合空如此即授記矣古云祖祖心空佛佛道同諸法者塵妄之法也義者法之儀則也如來覺體本空不立諸法不礙諸法淨如明鏡能應物現形譬鏡本無相相由鏡現心本無法法從心顯故此如來之心諸法如義也若有人言如來得阿耨音奴入聲多羅三藐音渺三菩提須菩提實無有法佛得阿耨多羅三藐三菩提佛言我菩提妙心者實從無法中得也故楞嚴經云菩提心生生滅心滅須菩提如來所得阿耨音奴入聲多羅三藐音渺三菩提於是中無實無虗無實者色即是空無虗者空即是色此菩提妙體莫惻其方莫窮其際言實亦非實言虗亦不虗是故如來說一切法皆是佛法法外無心心外無法故云皆是佛法也須菩提所言一切法者即非一切法是故名一切法法本無實但是虗名須菩提譬如人身長大須菩提言世尊如來說人身長大即為非大身是名大身與前十會同意須菩提菩薩亦如是若作是言我當滅度無量眾生即不名菩薩菩薩者乃覺有情也眾生者即情識也若情見未盡即非菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無眾生無壽者真心本寂諸法本空故佛說言凡一切諸法皆無人我眾生壽者之念是人妄執四相也謂菩薩若能空諸法相是真菩薩此章承上繳下之義也須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴若莊嚴佛土著相迷心則不名菩薩佛土在心而不在相何假莊嚴既著其相即非莊嚴矣須菩提若菩薩通達無我法者如來說名真是菩薩無我則識空無法則情盡若人通達情識無體是名真菩薩一體同觀分第十八須菩提於意云何如來有肉眼不音否如是世尊如來有肉眼須菩提於意云何如來有天眼不音否如是世尊如來有天眼須菩提於意云何如來有慧眼不音否如是世尊如來有慧眼須菩提於意云何如來有法眼不音否如是世尊如來有法眼須菩提於意云何如來有佛眼不音否如是世尊如來有佛眼眼雖分五心惟是一見有通塞知無間斷顏居士云肉眼見諸色相天眼普照大千慧眼智燭常明法眼了諸法空佛眼自性常明融通無閡傅頌曰天眼通非閡肉眼閡非通法眼唯觀俗慧眼直緣空佛眼如千日照異體還同圓明法界內無處不含容須菩提於意云何如恒河中所有沙佛說是沙不音否如是世尊如來說是沙須菩提於意云何如一恒河中所有沙有如是沙等恒河是諸恒河所有沙數佛世界如是寧為多不音否甚多世尊恒河者舍衛國城外有河名恒河也河中之沙細如麵末謂此恒河中有無量沙數一粒之沙亦為一恒河也如是諸沙等諸恒河亦諸恒河中有無量無數之沙此說極多矣言佛世界亦多之如此佛以恒沙世界言之甚多耳佛告須菩提爾所國土中所有眾生若干種心如來悉知若干者干是不俱之數也所有恒沙世界國土盡因眾生妄業所感而生眾生諸心如來悉知者凡眾生妄心因業引起而有業識妄想盡依真體發現故楞嚴云迷妄有虗空因空立世界想澄成國土知覺乃眾生但有塵緣妄想悉依心現故云如來悉知也何以故如來說諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得凡有心識盡隨業生無有實體遇緣即生緣消即滅故說非心是名為心矣三心亦非有也故論云過去已滅未來未至現在空寂三世求之了不可得楞嚴註云三際求心心不有心不有處妄原無妄心無處即菩提生死涅槃本平等法身通化分第十九須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不音否如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多因緣得福者福因修布而生言福德無者福因緣消而滅惟有法體週圓融通無礙是真福德也離色離相分第二十須菩提於意云何佛可以具足色身見不音否不音弗也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不音否不音弗也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足佛者覺也具足色身諸相者言具足報身三十二相也此覺心如海身相如漚若人著身相求見真佛誠為認漚為海也身相總歸幻化雖然身相具足佛言即非具足是名身相具足也非說所說分第二十一須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法勿者止也佛說此一卷金剛般若之法恐人心生說法之念故誡須菩提莫謂如來有說法之念謗者妄言也言人不能解其覺體本淨無有法念妄言佛有此說法之念若心無一法是真說法也故維摩經云法無眾生離眾生垢故法無有我離我垢故法無壽命離生死故法無有人前後際斷故離此諸緣何法可說故此真空法體無法可說是名為說也爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是法生信心不音否佛言須菩提彼非眾生非不眾生何以故須菩提眾生眾生者如來說非眾生是名眾生須菩提得佛智慧故稱慧命也問言倘未來之世若眾生聞此真心無說之法亦能信否佛知須菩提心起眾生之念故答云彼非眾生非不眾生彼非眾生者指未來眾生非實眾生也非不眾生者言此眾生因業感報而生也眾生雖妄亦依真有乃生佛同原惟隔迷悟但去執情眾生即佛矣故華嚴論云一切眾生本來成佛云眾生眾生者乃佛審問須菩提言汝以眾生為眾生佛言我如來說眾生非眾生也無法可得分第二十二須菩提白佛言世尊佛得阿耨音奴入聲多羅三音渺藐三菩提為無所得耶如是如是須菩提我於阿耨多羅三藐音渺三菩提乃至無有少法可得是名阿耨音奴入聲多羅三藐音渺三菩提須菩提深悟菩提體上實無所得佛先許其契理的當後亦引淺至深言我於此理亦無少法可得菩提亦是虗名也淨心行善分第二十三復次須菩提是法平等無有高下是名阿耨音奴入聲多羅三藐音渺三菩提是法平等者此法無物不有無時不然矣法本無高下奈業有差殊若人有一念之善福即隨生報感人天之樂若有一念之惡罪即隨至報感三途之苦故法體平等高下由業自生即此平等之法是名菩提之正因也以無我無人無眾生無壽者修一切善法即得阿耨音奴入聲多羅三藐音渺三菩提修一切善法者當修四聖諦十二因緣六度萬行三十七品助道法五十五種菩提路此一切法俱名善法也若人空其四相修諸善法潔淨其心即得證此菩提妙果矣須菩提所言善法者如來說非善法是名善法善法雖美法體實無纔生貪染便瞖菩提故云黃金雖至寶入眼亦如塵福智無比分第二十四須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一千萬億分乃至筭數譬喻所不能及所謂三千大千世界中須彌山者總而言之有百德日月百億須彌是也言此多為須彌山之七寶布施之福與般若真智為人演說之福佛言千萬億分莫及其一矣以此福德與智慧較之誠乃無比無極也化無所化分第二十五須菩提於意云何汝等勿謂如來作是念我當度眾生須菩提莫作是念何以故實無有眾生如來度者若有眾生如來度者如來即有我人眾生壽者佛止須菩提言莫謂如來有度生之念也如來者真如體也眾生者情識也言真如體上實無情識既有情識則有四相矣須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫今如來說我者乃權也亦非有我之念故頌云利生權立我證理實無人此凡夫執著認相為我古云色身非我任為我法身真我而不任是以凡夫無實體故說非凡夫也法身非相分第二十六須菩提於意云何可以三十二相觀如來不音否須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來三十二相佛之報身如來法身非相也須菩提以三十二相觀佛法身者執波為水也故佛說若認相為佛者轉輪聖王亦佛也轉輪聖王亦有三十二相報身矣須菩提亦言不當三十二相觀佛法身者是撥波求水也未明水之真體故此經云聲色者傍外之門非真佛體也若人著相離相者即是邪外之道實不能見真佛法身也頌云聲色見聞皆是妄真空無相鏡非臺四八身中尋得佛轉輪王相即如來無斷無滅分第二十七須菩提汝若作是念如來不以具足相故得阿耨音奴入聲多羅三藐音渺三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提此一章承上章而言也以者當作是也須菩提前言以三十二相觀如來心者是常見之所惑後言以不應以三十二相觀如來心者是斷見之所失也佛恐人陷於斷常見中故作此問呼須菩提徵之汝若作是念謂佛不是具足相中得菩提心者此言心相乖違生斷滅之見也豈不見心經云色不異空空不異色故云即波即水即妄即真何得除此身相之外而別有菩提心也佛誡之莫作是念者勿謂佛不是具足相中得菩提心也須菩提汝若作是念發阿耨音奴入聲多羅三藐音渺三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相汝若作無相發菩提心之念者言相非心而心非相說諸法斷滅重誡之莫作此無相得心之念何以故若發大菩提心之人於諸法相無罣無礙不著不離不說斷滅相也不受不貪分第二十八須菩提若菩薩以滿恒河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故知一切法無我者法本無我是人妄生分別以為有我若人知心無法知法非我如此則聖凡情盡能所見消即得成無生法忍直證菩提何干福德也須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德菩薩心空無法於福不著若著福德福德亦是法矣故云但能萬法不相干一超直入如來地威儀寂靜分第二十九威儀自威儀寂處有誰知若作威儀相大象沒深泥須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來如來者佛真法身也遍滿虗空實無來去今言此來去坐臥者來為法生去為法滅來去是法坐臥是相豈其佛法身而有來去耶若人言此法身有此來去者是未解實義也故如來說無所來去也古德云來為眾生來去為眾生去法身等虗空住在無心處一合理相分第三十須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾寧為多不音否甚多世尊何以故若是微塵眾實有者佛即不說是微塵眾所以者何佛說微塵眾即非微塵眾是名微塵眾世尊如來所說三千大千世界即非世界是名世界佛雖然說此世界微塵亦為發明一真之理也微塵無實世界非堅縱有無量之多亦是虗名也何以故若世界實有者即是一合相如來說一合相即非一合相是名一合相一合相者一者乃一空真理也相者乃世界幻妄諸相也合者和合也謂一空真理融通和合世界諸相如膠投色正謂色無膠不立膠無色不顯真妄融通合成世界諸相矣故楞嚴云猶如世間諸相雜和成一體者是也如來亦說非一合相者言諸相幻妄屢受變遷真空妙理實無成壞真理非理和合非合故非真一合相是名一合相也須菩提一合相者即是不可說但凡夫之人貪著其事若言真妄融通合為一相者佛止須菩提不可說但恐凡夫貪著妄相為真之事也凡夫未悟空理堅執妄相不蚤觀破欲待世界壞時方覺苦恩情別後始知空也知見不生分第三十一須菩提若人言佛說我見人見眾生見壽者見須菩提於意云何是人解我所說義不音否不也世尊是人不解如來所說義何以故世尊說我見人見眾生見壽者見即非我見人見眾生見壽者見是名我見人見眾生見壽者見我人眾生壽者此四相本非實體若人言佛亦有四相之說疑為實有者則此人能深解佛之大義否須菩提答云此人未能深解如來實義也是真體湛然空諸法相雖佛說是四相非有四相之念但言四相而已須菩提發阿耨音奴入聲多羅三藐音渺三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相如是知見者即此無分別之心是也如是信解者凡於一切法相莫作法相之念向外馳求如此無念之心是名發菩提心也所言法相者法本無體豈有相耶境來則法相自現境滅則法相自消故如來說法相非相是名相也應化非真分第三十二須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼云何為人演說不取於相如如不動何以故無量阿僧祗二者皆是數也言其數多之甚矣發菩薩心者須發最上一乘利生心也受持讀誦者心得經理曰受養心不動曰持究明經義曰演悟心無法曰說謂持此經乃至四句偈等者言此一卷金剛般若經全受持而讀誦也言發大菩薩心者方能受持此經為人演說流通世上也其福勝彼者說前種種布施立行施為盡屬幻化雖有福報終歸消滅惟此般若真體不屬修證若契此無為永不退轉惟此無為之福勝諸有為之福也云何演說者佛恐人泥於文字故說不取於相如如不動取者著也如如不動者言此真如湛寂應用無虧即此佛說一句如如不動收盡三藏十二部之教也頌曰末後如如這句經如來演說太分明舉頭若見空中月此點靈光本現成一切有為法如夢幻泡影如露亦如電應作如是觀此四句偈說此夢幻泡影露電六種虗妄為譬喻者謂有為之法悉是幻化無有實義故設此喻此無為妙體毫法不安正謂千峰勢到岳邊盡萬派聲歸海上消故涅槃云諸行無常是生滅法生滅滅已寂滅為樂佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行僧稱比丘師姑稱比丘尼居士稱優婆塞道姑稱優婆夷與一切世間人道眾天道眾修羅道眾此四種三道聞佛說此金剛般若真經妙義皆大歡喜誠心信受謹奉尊行也道川言此經頓超佛地敬而頌之曰飢得食渴得漿病得瘥熱得涼貧人遇寶嬰子見娘飄舟到岸遠客歸鄉旱逢甘澤國有忠良四夷拱奉八表誼揚頭頭俱顯物物全彰古今凡聖地獄天堂東西南北同沐恩光伏願剎塵沙界諸群品溥入金剛大道場此偈為看教者休著休棄而頌也其一金剛離相快如刀註解雖然亦是糟休向紙中尋佛跡但從心上覔香醪其二金剛今解以週全一會窮來一會玄未見月時休棄指得魚之後可忘筌般若真言納謨薄伽伐帝鉢唎二合若而也切波羅蜜多曳三怛姪他四唵五訖唎三合上其訖切地唎三合上庭逸切室利三合六戍嚕二合上鼠出切下力忽切知下以切七三密栗知上同佛方逸切八社野娑訶金剛心真言唵烏輪尼娑婆訶補闕真言南無喝囉怛那哆囉夜耶佉囉佉羅俱住俱住摩囉摩囉嗁囉吽賀賀蘇怛拏吽潑抹拏娑婆訶又補闕真言唵呼嚧呼嚧社野穆契娑訶普回向真言唵娑摩羅娑摩囉弭摩曩薩訶𭌯摩訶斫迦囉𭌯吽終收經偈三途永息輪迴苦六趣休隨汩沒因無邊含識悟真常萬類有情登彼岸金剛經讚三十二分功德難量四句玅偈廣宣揚須菩提白佛言無說無傳應作如是觀書金剛經直解後金剛經諸佛心地法門真實微妙了義乃金剛妙心者冲漠而永固虗靈而恒照獨立古今無增無減嘗出塵累無間凡聖雙泯雙照能絕境智一代之真說蓋極于茲乎昔孤獨園中暨吐此一言三光迴景移照乾坤卷而入懷故從阿難集貝葉於滅後而隨什師易梵音於華言頗就此經往往雖有註家或多或少果似未盡其美矣然圓杲師妙達佛旨鈎索深隱採摝精要成此編緝遠輝後來矣一日遊戲書林始得求斯直解玩味累日而以與學人曰此辭簡而義豐歷不周深徹宗嗟呼惜乎於離相一章之中嘆澆世受持之下註解之字湮沒甚多矣吾子退而有日來曰願加和訓及補脫落予撫膺扣頭曰豈得雖穿壁碩德輙測其幽微況猶於泥文句之淺識眾盲捫象汝宜需於之他我且得乎於彼然學人強不止故應其求為先矣正保四年十月三日鎮西府豐之前州永照釋西吟謹書其後金剛三昧一卷收于閱經十二種第九
